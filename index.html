<!DOCTYPE html>
<html>
	<head>
		<title>Gabriel Rios</title>
		<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto+Mono">
		<style>
			html {
				min-height: 100vh;
				position: relative;
			}

			* {
				text-align: center;
				margin: 0 auto;
				padding: 0;
			}

			::selection {
			  background-color: #dddddd;
			}

			::-moz-selection {
			  background-color: #dddddd;
			}


			main {			
				height: 80vh;	
				display: flex;
			  	flex-direction: column;
			  	justify-content: center;
			}


			h2#hdr {
				font: 2em 'Roboto Mono', sans-serif;
				padding: 0 10%;
				color: #222222;
			}

			span#hdr_str {
				color: #76B041;
				text-decoration: underline;
			}

			footer {
				height: 20vh;
				display: flex;
				flex-direction: column;
				justify-content: center;
			}

			ul#social {
				list-style: none;
			}

			ul#social li {
				font: 1em 'Roboto Mono', sans-serif;
				display: inline;
				margin: 0 20px;
			}

			ul#social li a#github {
				color: #000000;
			}

			ul#social li a#linkedin {
				color: #0072b1;
			}

		</style>
		<script type="text/javascript">
			window.onload = function start() {
				stringSwitch();
			}
			// Set increment
			var i = 1;
			function stringSwitch(){
				var strs = ['researcher', 'student', '`90s cartoon junkie', 'career 22% FG shooter'];
				var colors = ['#76B041', '#9DABFB', '#17BEBB', '#E4572E'];
				window.setInterval(function() {
					document.getElementById('hdr_str').style.color = colors[i % colors.length];
					document.getElementById('hdr_str').innerHTML = strs[i % strs.length];
					i++
				}, 2500)			
			}
		</script>
	</head>
	<body>
		<main>
			<h2 id="hdr">Hey, I'm Gabe. I'm a <span id="hdr_str">researcher</span>.</h2>
		</main>
		<footer>									
			<ul id="social">
				<li><a id="github" href="https://github.com/mr-gabrielrios">GitHub</a></li>
				<li><a id="linkedin" href="https://www.linkedin.com/in/gabriel-rios-a1a9b6b7/">LinkedIn</a></li>
			</ul>
		</footer>
	</body>
</html>
